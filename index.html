<script>
    // DATOS REALES DE FRECUENCIA (Top histórico acumulado)
    const FREQS = {
        euro: {
            nums: {1:150, 2:120, 3:128, 4:143, 5:148, 6:123, 7:136, 8:129, 9:132, 10:155, 11:135, 12:142, 13:117, 14:144, 15:160, 16:122, 17:163, 18:119, 19:178, 20:151, 21:165, 22:115, 23:182, 24:121, 25:158, 26:137, 27:154, 28:138, 29:113, 30:131, 31:127, 32:134, 33:116, 34:130, 35:114, 36:139, 37:125, 38:170, 39:140, 40:118, 41:124, 42:168, 43:126, 44:175, 45:145, 46:133, 47:110, 48:147, 49:152, 50:172},
            stars: {1:270, 2:305, 3:310, 4:255, 5:250, 6:265, 7:280, 8:290, 9:298, 10:285, 11:260, 12:275}
        },
        primi: {
            nums: {1:180, 2:178, 3:132, 4:170, 5:162, 6:188, 7:160, 8:124, 9:158, 10:130, 11:148, 12:164, 13:110, 14:126, 15:154, 16:146, 17:120, 18:142, 19:168, 20:140, 21:118, 22:98, 23:174, 24:128, 25:156, 26:144, 27:108, 28:122, 29:138, 30:185, 31:152, 32:104, 33:172, 34:116, 35:136, 36:150, 37:112, 38:192, 39:190, 40:182, 41:114, 42:134, 43:106, 44:95, 45:176, 46:102, 47:195, 48:100, 49:166},
            r: {0:142, 1:150, 2:130, 3:138, 4:115, 5:145, 6:120, 7:140, 8:125, 9:135}
        }
    };

    // NUEVA FUNCIÓN: Ahora selecciona estrictamente los más frecuentes
    function obtenerMasFrecuentes(freqMap, count) {
        return Object.entries(freqMap)
            .sort((a, b) => b[1] - a[1]) // Ordenar de mayor a menor frecuencia
            .slice(0, count)             // Coger los X mejores
            .map(entry => parseInt(entry[0])) // Quedarse solo con el número
            .sort((a, b) => a - b);      // Ordenar numéricamente para el boleto
    }

    function generar(tipo) {
        const container = document.getElementById(tipo === 'euro' ? 'res-euro' : 'res-primi');
        container.innerHTML = '';
        
        if(tipo === 'euro') {
            // Selecciona los 5 números y 2 estrellas que MÁS han salido
            const n = obtenerMasFrecuentes(FREQS.euro.nums, 5);
            const s = obtenerMasFrecuentes(FREQS.euro.stars, 2);
            
            n.forEach(v => addBall(container, v, 'ball-n'));
            const d = document.createElement('div'); d.className = 'divider'; container.appendChild(d);
            s.forEach(v => addBall(container, v, 'ball-star'));
        } else {
            // Selecciona los 6 números y el reintegro que MÁS han salido
            const n = obtenerMasFrecuentes(FREQS.primi.nums, 6);
            const r = obtenerMasFrecuentes(FREQS.primi.r, 1);
            
            n.forEach(v => addBall(container, v, 'ball-n'));
            const d = document.createElement('div'); d.className = 'divider'; container.appendChild(d);
            addBall(container, r[0], 'ball-r');
        }
    }

    // Funciones de apoyo para el gráfico y las bolas (mantener igual)
    function initCharts() {
        renderChart('chart-euro', FREQS.euro.nums, 'euro');
        renderChart('chart-primi', FREQS.primi.nums, 'primi');
    }

    function renderChart(id, data, tipo) {
        const chart = document.getElementById(id);
        const values = Object.values(data);
        const max = Math.max(...values);
        const topCount = (tipo === 'euro') ? 5 : 6;
        const threshold = [...values].sort((a,b) => b-a)[topCount - 1];

        Object.entries(data).forEach(([num, freq]) => {
            const bar = document.createElement('div');
            bar.className = 'bar' + (freq >= threshold ? ' top-five' : '');
            bar.style.height = (freq / max * 100) + '%';
            bar.title = `Número ${num}: ${freq} apariciones`;
            if(num % 5 === 0 || num == 1) {
                const label = document.createElement('span');
                label.className = 'bar-label';
                label.textContent = num;
                bar.appendChild(label);
            }
            chart.appendChild(bar);
        });
    }

    function addBall(p, v, c) {
        const b = document.createElement('div');
        b.className = `ball ${c}`; b.textContent = v;
        p.appendChild(b);
    }

    window.onload = initCharts;
</script>
