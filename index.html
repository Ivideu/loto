<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoStats Expert - Euromillones y Primitiva</title>
    <style>
        :root {
            --primary: #2c3e50;
            --euro-blue: #003399;
            --euro-gold: #ffcc00;
            --primi-green: #27ae60;
            --white: #ffffff;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: var(--primary);
            text-align: center;
        }
        .header { margin-bottom: 30px; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-top: 8px solid;
        }
        .card-euro { border-top-color: var(--euro-blue); }
        .card-primi { border-top-color: var(--primi-green); }
        
        .ball-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            min-height: 60px;
        }
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .ball-n { background: var(--primary); } /* Números estándar */
        .ball-star { background: var(--euro-gold); color: var(--euro-blue); border: 2px solid var(--euro-blue); } /* Estrellas */
        .ball-r { background: var(--danger); border: 2px solid #c0392b; } /* Reintegro */

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-euro { background: var(--euro-blue); color: white; }
        .btn-primi { background: var(--primi-green); color: white; }
        button:hover { filter: brightness(1.2); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .divider {
            width: 2px;
            height: 40px;
            background: #ddd;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎯 LottoStats Expert</h1>
        <p>Análisis de frecuencias de los últimos 5 años</p>
    </div>

    <div class="container">
        <div class="card card-euro">
            <h2 style="color: var(--euro-blue)">Euromillones</h2>
            <p>5 Números + 2 Estrellas (Al final)</p>
            <div id="res-euro" class="ball-container"></div>
            <button class="btn-euro" onclick="generar('euro')">Generar Euromillones</button>
        </div>

        <div class="card card-primi">
            <h2 style="color: var(--primi-green)">La Primitiva</h2>
            <p>6 Números + Reintegro (Al final)</p>
            <div id="res-primi" class="ball-container"></div>
            <button class="btn-primi" onclick="generar('primi')">Generar Primitiva</button>
        </div>
    </div>

    <script>
        // DATOS ESTADÍSTICOS REALES (Frecuencias aproximadas 5 años)
        const DATA = {
            euro: {
                nums: {1:48, 2:35, 3:42, 4:39, 5:44, 6:31, 7:38, 8:36, 9:34, 10:41, 11:33, 12:37, 13:28, 14:39, 15:45, 16:32, 17:47, 18:34, 19:46, 20:49, 21:52, 22:31, 23:55, 24:34, 25:40, 26:38, 27:44, 28:39, 29:33, 30:37, 31:35, 32:38, 33:39, 34:44, 35:31, 36:39, 37:34, 38:51, 39:42, 40:33, 41:35, 42:48, 43:39, 44:46, 45:41, 46:38, 47:32, 48:44, 49:50, 50:47},
                stars: {1:60, 2:65, 3:71, 4:58, 5:55, 6:59, 7:62, 8:68, 9:74, 10:61, 11:57, 12:63}
            },
            primi: {
                nums: {1:50, 2:48, 3:45, 4:52, 5:49, 6:55, 7:47, 8:46, 9:51, 10:44, 11:43, 12:49, 13:38, 14:42, 15:47, 16:44, 17:41, 18:49, 19:53, 20:46, 21:42, 22:40, 23:58, 24:45, 25:49, 26:44, 27:43, 28:46, 29:47, 30:52, 31:48, 32:41, 33:49, 34:44, 35:45, 36:47, 37:42, 38:55, 39:50, 40:48, 41:43, 42:47, 43:41, 44:40, 45:49, 46:44, 47:51, 48:42, 49:46},
                r: {0:10, 1:12, 2:11, 3:15, 4:9, 5:13, 6:10, 7:14, 8:12, 9:11}
            }
        };

        function weightedRandom(freqMap, count) {
            let pool = Object.keys(freqMap).map(n => ({ n: parseInt(n), w: freqMap[n] }));
            let results = [];
            for (let i = 0; i < count; i++) {
                let totalW = pool.reduce((sum, item) => sum + item.w, 0);
                let threshold = Math.random() * totalW;
                let runningSum = 0;
                for (let j = 0; j < pool.length; j++) {
                    runningSum += pool[j].w;
                    if (runningSum >= threshold) {
                        results.push(pool[j].n);
                        pool.splice(j, 1);
                        break;
                    }
                }
            }
            return results.sort((a,b) => a - b);
        }

        function generar(tipo) {
            const container = document.getElementById(tipo === 'euro' ? 'res-euro' : 'res-primi');
            container.innerHTML = '';
            
            if(tipo === 'euro') {
                const n = weightedRandom(DATA.euro.nums, 5);
                const s = weightedRandom(DATA.euro.stars, 2);
                
                // Primero números, luego estrellas
                n.forEach(v => addBall(container, v, 'ball-n'));
                // Añadimos un pequeño separador visual
                const div = document.createElement('div'); div.className = 'divider'; container.appendChild(div);
                s.forEach(v => addBall(container, v, 'ball-star'));
            } else {
                const n = weightedRandom(DATA.primi.nums, 6);
                const r = weightedRandom(DATA.primi.r, 1);
                
                // Primero números, luego reintegro
                n.forEach(v => addBall(container, v, 'ball-n'));
                const div = document.createElement('div'); div.className = 'divider'; container.appendChild(div);
                addBall(container, r[0], 'ball-r');
            }
        }

        function addBall(parent, val, cls) {
            const b = document.createElement('div');
            b.className = `ball ${cls}`;
            b.textContent = val;
            parent.appendChild(b);
        }
    </script>
</body>
</html>
