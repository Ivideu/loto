name: Actualizar Estadísticas Semanales

on:
  schedule:
    # Se ejecuta todos los domingos a las 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests pandas

      - name: Ejecutar script de actualización
        run: python actualizar_datos.py

      - name: Guardar cambios en el repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add historial.json
          git commit -m "Actualización automática de estadísticas" || echo "No hay cambios"
          git push